name: Fix Maxine chained passes and stats

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/fix-maxine-chained-passes.yml

permissions:
  contents: write

jobs:
  patch-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr
          submodules: recursive

      - name: Apply chained-pass interop fix
        shell: pwsh
        env:
          PATCH_GZIP_BASE64: ""
        run: |
          $bytes = [Convert]::FromBase64String($env:PATCH_GZIP_BASE64)
          $input = [IO.MemoryStream]::new($bytes)
          $gzip = [IO.Compression.GzipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create('maxine-interop-fix.patch')
          try { $gzip.CopyTo($output) } finally { $output.Dispose(); $gzip.Dispose(); $input.Dispose() }
          git apply --check --whitespace=nowarn maxine-interop-fix.patch
          git apply --whitespace=nowarn maxine-interop-fix.patch
          Remove-Item maxine-interop-fix.patch
          Remove-Item .github/workflows/fix-maxine-chained-passes.yml
          git diff --check

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait *>&1 | Tee-Object build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Maxine-chained-passes-build-log
          path: build.log

      - name: Commit fix
        shell: pwsh
        run: |
          Remove-Item build.log -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: support chained Maxine passes"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR-chained-passes
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
