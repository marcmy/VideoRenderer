name: Fix Maxine hotkey resize latency

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/fix-maxine-hotkey-resize.yml

permissions:
  contents: write

jobs:
  patch-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr
          submodules: recursive

      - name: Avoid rebuilding Maxine for presentation-only changes
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path("Source/DX11VideoProcessor.cpp")
          text = path.read_text(encoding="utf-8")
          old = '''void CDX11VideoProcessor::SetVideoRect(const CRect& videoRect)
          {
          \tm_videoRect = videoRect;
          \tUpdateRenderRect();
          \tUpdateTexures();
          }
          '''
          new = '''void CDX11VideoProcessor::SetVideoRect(const CRect& videoRect)
          {
          \tm_videoRect = videoRect;
          \tUpdateRenderRect();

          \t// Maxine uses a fixed source-derived inference size. Zoom, stretch,
          \t// pan and other presentation-only changes must not destroy and reload
          \t// the Maxine effects on every hotkey step.
          \tCSize maxineTargetSize;
          \tif (!GetMaxineVSRTargetSize(m_videoRect, maxineTargetSize)) {
          \t\tUpdateTexures();
          \t}
          }
          '''
          if text.count(old) != 1:
              raise RuntimeError(f"Expected one SetVideoRect block, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="")
          '@ | Set-Content -LiteralPath patch.py -Encoding utf8
          python patch.py
          Remove-Item patch.py
          Remove-Item .github/workflows/fix-maxine-hotkey-resize.yml
          git diff --check

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait *>&1 | Tee-Object build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Maxine-hotkey-resize-build-log
          path: build.log

      - name: Commit fix
        shell: pwsh
        run: |
          Remove-Item build.log -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep Maxine effects alive during zoom and stretch"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR-hotkey-resize
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
