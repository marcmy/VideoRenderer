name: Apply Maxine scale denoise and deblur

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/apply-maxine-jasna-controls.yml

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr
          submodules: recursive

      - name: Reconstruct and apply implementation patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $chunks = Get-ChildItem .github/patches/maxine-controls-v2.chunk* | Sort-Object Name
          if ($chunks.Count -ne 6) { throw "Expected 6 patch chunks, found $($chunks.Count)." }
          $encoded = ($chunks | ForEach-Object { (Get-Content $_.FullName -Raw).Trim() }) -join ''
          $compressed = [Convert]::FromBase64String($encoded)
          $input = [IO.MemoryStream]::new($compressed)
          $gzip = [IO.Compression.GzipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create('maxine-controls-v2.patch')
          try { $gzip.CopyTo($output) } finally { $output.Dispose(); $gzip.Dispose(); $input.Dispose() }

          git apply --check --whitespace=nowarn maxine-controls-v2.patch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git apply --whitespace=nowarn maxine-controls-v2.patch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Remove-Item maxine-controls-v2.patch
          Remove-Item .github/patches/maxine-controls-v2.chunk*
          Remove-Item .github/patches/maxine-jasna-controls.b64.* -ErrorAction SilentlyContinue
          Remove-Item .github/workflows/apply-maxine-jasna-controls.yml
          Remove-Item .github/workflows/snapshot-maxine-current.yml -ErrorAction SilentlyContinue
          git config core.whitespace cr-at-eol
          git diff --check

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait *>&1 | Tee-Object build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Maxine-controls-build-log
          path: build.log

      - name: Commit implementation
        shell: pwsh
        run: |
          Remove-Item build.log -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add Maxine scale denoise and deblur controls"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR-controls
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
