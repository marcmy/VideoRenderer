name: Apply NVIDIA Maxine VSR implementation

on:
  push:
    branches:
      - feature/nvidia-maxine-vsr
    paths:
      - .github/workflows/source-snapshot.yml

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr

      - name: Apply implementation patch
        shell: pwsh
        env:
          PATCH_GZIP_BASE64: ""
        run: |
          $compressed = [Convert]::FromBase64String($env:PATCH_GZIP_BASE64)
          $input = [IO.MemoryStream]::new($compressed)
          $gzip = [IO.Compression.GzipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create("maxine-vsr.patch")
          try { $gzip.CopyTo($output) } finally { $output.Dispose(); $gzip.Dispose(); $input.Dispose() }
          git apply --whitespace=nowarn maxine-vsr.patch
          Remove-Item maxine-vsr.patch
          Remove-Item .github/workflows/source-snapshot.yml

      - name: Build VideoRenderer
        shell: pwsh
        run: .\build_mpcvr.cmd NoWait

      - name: Commit implementation
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add optional NVIDIA Maxine VSR"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
