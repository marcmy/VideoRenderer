name: Supply-chain audit

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Every Monday at 07:23 UTC
    - cron: "23 7 * * 1"

permissions: {}

jobs:
  cleanup-obsolete-workflow-history:
    name: Remove obsolete workflow history
    if: github.event_name == 'push' && github.event.head_commit.message == 'chore: remove obsolete Actions sidebar entries'
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Delete runs belonging to retired workflows
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t runs < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" \
              --jq '.workflow_runs[] | [.id, .name, .path] | @tsv'
          )

          deleted=0
          for row in "${runs[@]}"; do
            IFS=$'\t' read -r run_id workflow_name workflow_path <<< "$row"

            case "$workflow_name" in
              "Add Maxine supersampling and fix settings layout"|
              "Apply broader Maxine VSR support"|
              "Apply Maxine Jasna controls"|
              "Apply Maxine VSR patch"|
              "Fix Maxine chained passes and stats"|
              "Fix Maxine hotkey resize latency"|
              "Fix Maxine rotation and portrait display support"|
              "Fix Maxine VSR runtime loading"|
              "Fix Maxine VSR runtime loading v2"|
              "Reapply broader Maxine VSR support"|
              "Snapshot current Maxine source"|
              "Source snapshot")
                echo "Deleting run ${run_id}: ${workflow_name} (${workflow_path})"
                if gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"; then
                  deleted=$((deleted + 1))
                else
                  echo "Warning: could not delete run ${run_id}" >&2
                fi
                ;;
            esac
          done

          echo "Deleted ${deleted} obsolete workflow run(s)."

      - name: Restore the original workflow file
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/supply-chain-audit.yml > .github/workflows/supply-chain-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/supply-chain-audit.yml
          git commit -m "Restore supply-chain audit workflow after sidebar cleanup"
          git push origin HEAD:master

  trivy:
    name: Trivy security scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload findings to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  syft:
    name: Generate independent SBOM
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Generate SPDX SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          artifact-name: sbom.spdx.json
          dependency-snapshot: true
          upload-artifact: true
          upload-release-assets: false
