name: Supply-chain audit

on:
  pull_request:
    branches:
      - master

permissions: {}

jobs:
  cleanup-obsolete-workflow-history:
    name: Remove obsolete workflow history
    if: github.head_ref == 'cleanup/obsolete-actions-sidebar'
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete runs belonging to retired workflows
        shell: bash
        run: |
          set -euo pipefail

          declare -A targets=(
            ["Add Maxine supersampling and fix settings layout"]=1
            ["Apply broader Maxine VSR support"]=1
            ["Apply Maxine Jasna controls"]=1
            ["Apply Maxine VSR patch"]=1
            ["Fix Maxine chained passes and stats"]=1
            ["Fix Maxine hotkey resize latency"]=1
            ["Fix Maxine rotation and portrait display support"]=1
            ["Fix Maxine VSR runtime loading"]=1
            ["Fix Maxine VSR runtime loading v2"]=1
            ["Reapply broader Maxine VSR support"]=1
            ["Snapshot current Maxine source"]=1
            ["Source snapshot"]=1
          )

          mapfile -t runs < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" \
              --jq '.workflow_runs[] | [.id, .name, .path] | @tsv'
          )

          deleted=0
          failed=0
          matched=0

          for row in "${runs[@]}"; do
            IFS=$'\t' read -r run_id workflow_name workflow_path <<< "$row"
            if [[ -z "${targets[$workflow_name]+present}" ]]; then
              continue
            fi

            matched=$((matched + 1))
            echo "Deleting run ${run_id}: ${workflow_name} (${workflow_path})"
            if gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"; then
              deleted=$((deleted + 1))
            else
              failed=$((failed + 1))
              echo "Failed to delete run ${run_id}" >&2
            fi
          done

          echo "Matched obsolete runs: ${matched}"
          echo "Deleted obsolete runs: ${deleted}"
          echo "Failed deletions: ${failed}"

          {
            echo "## Obsolete workflow cleanup"
            echo
            echo "- Matched runs: ${matched}"
            echo "- Deleted runs: ${deleted}"
            echo "- Failed deletions: ${failed}"
          } >> "$GITHUB_STEP_SUMMARY"

          if (( failed > 0 )); then
            exit 1
          fi

      - name: Delete temporary cleanup branch
        if: always()
        shell: bash
        run: |
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/cleanup/obsolete-actions-sidebar"
