name: Supply-chain audit

on:
  pull_request:
    branches:
      - master

permissions: {}

jobs:
  verify-obsolete-workflow-history:
    name: Verify obsolete workflow history is gone
    if: github.head_ref == 'cleanup/verify-obsolete-actions-sidebar'
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Count remaining retired workflow runs
        shell: bash
        run: |
          set -euo pipefail

          declare -A targets=(
            ["Add Maxine supersampling and fix settings layout"]=1
            ["Apply broader Maxine VSR support"]=1
            ["Apply Maxine Jasna controls"]=1
            ["Apply Maxine VSR patch"]=1
            ["Fix Maxine chained passes and stats"]=1
            ["Fix Maxine hotkey resize latency"]=1
            ["Fix Maxine rotation and portrait display support"]=1
            ["Fix Maxine VSR runtime loading"]=1
            ["Fix Maxine VSR runtime loading v2"]=1
            ["Reapply broader Maxine VSR support"]=1
            ["Snapshot current Maxine source"]=1
            ["Source snapshot"]=1
          )

          remaining=0
          mapfile -t runs < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" \
              --jq '.workflow_runs[] | [.id, .name, .path] | @tsv'
          )

          for row in "${runs[@]}"; do
            IFS=$'\t' read -r run_id workflow_name workflow_path <<< "$row"
            if [[ -n "${targets[$workflow_name]+present}" ]]; then
              remaining=$((remaining + 1))
              echo "Remaining: ${run_id}: ${workflow_name} (${workflow_path})"
            fi
          done

          echo "Remaining obsolete workflow runs: ${remaining}"
          if (( remaining > 0 )); then
            exit 1
          fi

      - name: Delete temporary verification branch
        if: always()
        shell: bash
        run: |
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/cleanup/verify-obsolete-actions-sidebar"
