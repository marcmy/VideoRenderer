name: Snapshot current Maxine source

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/snapshot-maxine-current.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/nvidia-maxine-vsr
          submodules: recursive
      - uses: actions/upload-artifact@v4
        with:
          name: maxine-current-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
