name: Apply broader Maxine VSR support

on:
  push:
    branches:
      - feature/nvidia-maxine-vsr
    paths:
      - .github/workflows/apply-maxine-compat.yml

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr
          submodules: recursive

      - name: Apply compatibility patch
        shell: pwsh
        env:
          PATCH_GZIP_BASE64: ""
        run: |
          $bytes = [Convert]::FromBase64String($env:PATCH_GZIP_BASE64)
          $input = [IO.MemoryStream]::new($bytes)
          $gzip = [IO.Compression.GzipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create('maxine-compat.patch')
          try { $gzip.CopyTo($output) } finally { $output.Dispose(); $gzip.Dispose(); $input.Dispose() }
          git apply --whitespace=nowarn maxine-compat.patch
          Remove-Item maxine-compat.patch
          Remove-Item .github/workflows/apply-maxine-compat.yml
          git diff --check

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait *>&1 | Tee-Object build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Maxine-compat-build-log
          path: build.log

      - name: Commit compatibility update
        shell: pwsh
        run: |
          Remove-Item build.log -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: broaden Maxine VSR input and scaling support"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR-compat
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
