name: Apply broader Maxine VSR support

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/apply-maxine-compat.yml

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr
          submodules: recursive

      - name: Apply compatibility changes
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          def replace_exact(filename: str, old: str, new: str) -> None:
              path = Path(filename)
              data = path.read_bytes()
              newline = b"\r\n" if b"\r\n" in data else b"\n"
              old_bytes = old.replace("\n", newline.decode()).encode("utf-8")
              new_bytes = new.replace("\n", newline.decode()).encode("utf-8")
              count = data.count(old_bytes)
              if count != 1:
                  raise RuntimeError(f"{filename}: expected one match, found {count}")
              path.write_bytes(data.replace(old_bytes, new_bytes, 1))

          replace_exact(
              "Source/DX11VideoProcessor.h",
              r'''\tTex11Video_t m_TexSrcVideo; // for copy of frame
          \tTex2D_t m_TexConvertOutput;
          \tTex2D_t m_TexMaxineVSR;''',
              r'''\tTex11Video_t m_TexSrcVideo; // for copy of frame
          \tTex2D_t m_TexConvertOutput;
          \tTex2D_t m_TexMaxineInput;
          \tTex2D_t m_TexMaxineVSR;''')

          replace_exact(
              "Source/DX11VideoProcessor.h",
              r'''\tint m_iMaxineVSR = MAXINEVSR_Disable;
          \tbool m_bMaxineVSRUsed = false;
          \tCNvidiaMaxineVSR m_MaxineVSR;''',
              r'''\tint m_iMaxineVSR = MAXINEVSR_Disable;
          \tbool m_bMaxineVSRUsed = false;
          \tstd::wstring m_strMaxineVSRStatus = L"Disabled";
          \tCNvidiaMaxineVSR m_MaxineVSR;''')

          replace_exact(
              "Source/DX11VideoProcessor.h",
              r'''\tbool CanUseMaxineVSR(const CRect& dstRect);
          \tvoid UpdateTexures();''',
              r'''\tbool GetMaxineVSRTargetSize(const CRect& dstRect, CSize& targetSize);
          \tvoid UpdateTexures();''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''#include <optional>
          #include "Helper.h"''',
              r'''#include <optional>
          #include <cmath>
          #include "Helper.h"''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''static const wchar_t* MaxineVSRQualityToString(const int quality)
          {
          \tswitch (quality) {
          \tcase MAXINEVSR_Low:    return L"Low";
          \tcase MAXINEVSR_Medium: return L"Medium";
          \tcase MAXINEVSR_High:   return L"High";
          \tcase MAXINEVSR_Ultra:  return L"Ultra";
          \tdefault:               return L"Off";
          \t}
          }

          const UINT dither_size = 32;''',
              r'''static const wchar_t* MaxineVSRQualityToString(const int quality)
          {
          \tswitch (quality) {
          \tcase MAXINEVSR_Low:    return L"Low";
          \tcase MAXINEVSR_Medium: return L"Medium";
          \tcase MAXINEVSR_High:   return L"High";
          \tcase MAXINEVSR_Ultra:  return L"Ultra";
          \tdefault:               return L"Off";
          \t}
          }

          static bool SourceMatchesSuperResLimit(const UINT width, const UINT height, const int limit)
          {
          \tauto CheckDimension = [width, height](const UINT maxWidth, const UINT maxHeight) {
          \t\treturn width >= height
          \t\t\t? width <= maxWidth && height <= maxHeight
          \t\t\t: height <= maxWidth && width <= maxHeight;
          \t};

          \tswitch (limit) {
          \tcase SUPERRES_SD:    return CheckDimension(1024u, 576u);
          \tcase SUPERRES_720p:  return CheckDimension(1280u, 720u);
          \tcase SUPERRES_1080p: return CheckDimension(2048u, 1088u);
          \tcase SUPERRES_1440p: return CheckDimension(2560u, 1440u);
          \tdefault:             return false;
          \t}
          }

          const UINT dither_size = 32;''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''\tm_MaxineVSR.Reset();
          \tm_bMaxineVSRUsed = false;
          \tm_TexMaxineVSR.Release();
          \tm_TexSrcVideo.Release();''',
              r'''\tm_MaxineVSR.Reset();
          \tm_bMaxineVSRUsed = false;
          \tm_TexMaxineInput.Release();
          \tm_TexMaxineVSR.Release();
          \tm_TexSrcVideo.Release();''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''bool CDX11VideoProcessor::CanUseMaxineVSR(const CRect& dstRect)
          {
          #ifdef _WIN64
          \tif (m_iMaxineVSR == MAXINEVSR_Disable || m_VendorId != PCIV_NVIDIA
          \t\t\t|| m_iRotation != 0 || m_bFlip || SourceIsHDR() || m_bVPUseRTXVideoHDR
          \t\t\t|| !m_srcRectWidth || !m_srcRectHeight) {
          \t\treturn false;
          \t}

          \tconst int dstWidthSigned = dstRect.Width();
          \tconst int dstHeightSigned = dstRect.Height();
          \tif (dstWidthSigned <= 0 || dstHeightSigned <= 0) {
          \t\treturn false;
          \t}

          \tconst UINT dstWidth = static_cast<UINT>(dstWidthSigned);
          \tconst UINT dstHeight = static_cast<UINT>(dstHeightSigned);
          \tif (dstWidth <= m_srcRectWidth || dstHeight <= m_srcRectHeight
          \t\t\t|| static_cast<unsigned long long>(dstWidth) > static_cast<unsigned long long>(m_srcRectWidth) * 4u
          \t\t\t|| static_cast<unsigned long long>(dstHeight) > static_cast<unsigned long long>(m_srcRectHeight) * 4u) {
          \t\treturn false;
          \t}

          \treturn static_cast<unsigned long long>(m_srcRectWidth) * dstHeight
          \t\t== static_cast<unsigned long long>(m_srcRectHeight) * dstWidth;
          #else
          \tUNREFERENCED_PARAMETER(dstRect);
          \treturn false;
          #endif
          }''',
              r'''bool CDX11VideoProcessor::GetMaxineVSRTargetSize(const CRect& dstRect, CSize& targetSize)
          {
          \ttargetSize = CSize(0, 0);

          #ifdef _WIN64
          \tif (m_iMaxineVSR == MAXINEVSR_Disable) {
          \t\tm_strMaxineVSRStatus = L"Disabled";
          \t\treturn false;
          \t}
          \tif (m_VendorId != PCIV_NVIDIA) {
          \t\tm_strMaxineVSRStatus = L"Requires an NVIDIA GPU";
          \t\treturn false;
          \t}
          \tif (!m_srcRectWidth || !m_srcRectHeight) {
          \t\tm_strMaxineVSRStatus = L"Waiting for source dimensions";
          \t\treturn false;
          \t}
          \tif (m_iVPSuperRes == SUPERRES_Disable) {
          \t\tm_strMaxineVSRStatus = L"Super Resolution source limit is disabled";
          \t\treturn false;
          \t}
          \tif (!SourceMatchesSuperResLimit(m_srcRectWidth, m_srcRectHeight, m_iVPSuperRes)) {
          \t\tm_strMaxineVSRStatus = L"Source exceeds the selected Super Resolution limit";
          \t\treturn false;
          \t}
          \tif (SourceIsHDR()) {
          \t\tm_strMaxineVSRStatus = L"HDR input is not supported yet";
          \t\treturn false;
          \t}
          \tif (m_bVPUseRTXVideoHDR) {
          \t\tm_strMaxineVSRStatus = L"Disable RTX Video HDR to use Maxine VSR";
          \t\treturn false;
          \t}
          \tif (m_iRotation != 0 || m_bFlip) {
          \t\tm_strMaxineVSRStatus = L"Rotation and flip are not supported yet";
          \t\treturn false;
          \t}

          \tconst int dstWidth = dstRect.Width();
          \tconst int dstHeight = dstRect.Height();
          \tif (dstWidth <= 0 || dstHeight <= 0) {
          \t\tm_strMaxineVSRStatus = L"Invalid destination size";
          \t\treturn false;
          \t}

          \tconst double scaleX = static_cast<double>(dstWidth) / m_srcRectWidth;
          \tconst double scaleY = static_cast<double>(dstHeight) / m_srcRectHeight;
          \tconst double requestedScale = std::max(scaleX, scaleY);
          \tif (requestedScale <= 1.0) {
          \t\tm_strMaxineVSRStatus = L"Not needed: output does not upscale the source";
          \t\treturn false;
          \t}

          \tconst UINT scale = static_cast<UINT>(std::clamp(std::ceil(requestedScale), 2.0, 4.0));
          \ttargetSize = CSize(m_srcRectWidth * scale, m_srcRectHeight * scale);
          \tm_strMaxineVSRStatus = requestedScale > 4.0
          \t\t? L"Eligible: Maxine 4x plus renderer scaling"
          \t\t: L"Eligible";
          \treturn true;
          #else
          \tUNREFERENCED_PARAMETER(dstRect);
          \tm_strMaxineVSRStatus = L"Requires a 64-bit build";
          \treturn false;
          #endif
          }''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''\tm_MaxineVSR.Reset();
          \tm_bMaxineVSRUsed = false;
          \tm_TexMaxineVSR.Release();

          \t// TODO: try making w and h a multiple of 128.
          \tHRESULT hr = S_OK;

          \tif (m_D3D11VP.IsReady()) {
          \t\tif (m_bVPScaling && !CanUseMaxineVSR(m_videoRect)) {''',
              r'''\tm_MaxineVSR.Reset();
          \tm_bMaxineVSRUsed = false;
          \tm_TexMaxineInput.Release();
          \tm_TexMaxineVSR.Release();

          \t// TODO: try making w and h a multiple of 128.
          \tHRESULT hr = S_OK;
          \tCSize maxineTargetSize;
          \tconst bool canUseMaxineVSR = GetMaxineVSRTargetSize(m_videoRect, maxineTargetSize);

          \tif (m_D3D11VP.IsReady()) {
          \t\tif (m_bVPScaling && !canUseMaxineVSR) {''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''\tconst UINT numSteps = GetPostScaleSteps();

          \tif (m_D3D11VP.IsReady()) {
          \t\tif (!(m_iSwapEffect == SWAPEFFECT_Discard && (m_VendorId == PCIV_AMDATI || m_VendorId == PCIV_INTEL))) {
          \t\t\tconst bool bNeedShaderTransform = CanUseMaxineVSR(dstRect) ||''',
              r'''\tconst UINT numSteps = GetPostScaleSteps();
          \tCSize maxineTargetSize;
          \tconst bool canUseMaxineVSR = GetMaxineVSRTargetSize(dstRect, maxineTargetSize);

          \tif (m_D3D11VP.IsReady()) {
          \t\tif (!(m_iSwapEffect == SWAPEFFECT_Discard && (m_VendorId == PCIV_AMDATI || m_VendorId == PCIV_INTEL))) {
          \t\t\tconst bool bNeedShaderTransform = canUseMaxineVSR ||''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''\tm_bMaxineVSRUsed = false;
          \tif (CanUseMaxineVSR(dstRect)) {
          \t\tconst CRect inputRect(0, 0, m_srcRectWidth, m_srcRectHeight);

          \t\t// CPU-uploaded RGB textures can be dynamic and cannot be registered with
          \t\t// CUDA. Copy them into the default RGB conversion texture first.
          \t\tif (pInputTexture != &m_TexConvertOutput
          \t\t\t\t&& m_TexConvertOutput.pTexture
          \t\t\t\t&& m_TexConvertOutput.desc.Format == DXGI_FORMAT_B8G8R8A8_UNORM
          \t\t\t\t&& pInputTexture->pShaderResource) {
          \t\t\tconst HRESULT copyHr = TextureCopyRect(*pInputTexture, m_TexConvertOutput.pTexture,
          \t\t\t\trSrc, inputRect, m_pPS_Simple, nullptr, 0, false);
          \t\t\tif (SUCCEEDED(copyHr)) {
          \t\t\t\tpInputTexture = &m_TexConvertOutput;
          \t\t\t\trSrc = inputRect;
          \t\t\t}
          \t\t}

          \t\tif (pInputTexture->desc.Format == DXGI_FORMAT_B8G8R8A8_UNORM
          \t\t\t\t&& rSrc == inputRect
          \t\t\t\t&& pInputTexture->desc.Width == m_srcRectWidth
          \t\t\t\t&& pInputTexture->desc.Height == m_srcRectHeight) {
          \t\t\tif (m_TexMaxineVSR.desc.Width != static_cast<UINT>(dstRect.Width())
          \t\t\t\t\t|| m_TexMaxineVSR.desc.Height != static_cast<UINT>(dstRect.Height())) {
          \t\t\t\tm_MaxineVSR.Reset();
          \t\t\t}

          \t\t\tconst HRESULT createHr = m_TexMaxineVSR.CheckCreate(m_pDevice, DXGI_FORMAT_B8G8R8A8_UNORM,
          \t\t\t\tdstRect.Width(), dstRect.Height(), Tex2D_DefaultShaderRTarget);
          \t\t\tif (SUCCEEDED(createHr)
          \t\t\t\t\t&& m_MaxineVSR.Process(m_pDeviceContext, pInputTexture->pTexture,
          \t\t\t\t\t\tm_TexMaxineVSR.pTexture, static_cast<unsigned>(m_iMaxineVSR))) {
          \t\t\t\tpInputTexture = &m_TexMaxineVSR;
          \t\t\t\trSrc.SetRect(0, 0, dstRect.Width(), dstRect.Height());
          \t\t\t\trotation = 0;
          \t\t\t\tm_bMaxineVSRUsed = true;
          \t\t\t}
          \t\t}
          \t}''',
              r'''\tm_bMaxineVSRUsed = false;
          \tif (canUseMaxineVSR) {
          \t\tconst CRect inputRect(0, 0, m_srcRectWidth, m_srcRectHeight);
          \t\tconst HRESULT inputCreateHr = m_TexMaxineInput.CheckCreate(m_pDevice,
          \t\t\tDXGI_FORMAT_B8G8R8A8_UNORM, m_srcRectWidth, m_srcRectHeight, Tex2D_DefaultShaderRTarget);

          \t\tif (FAILED(inputCreateHr)) {
          \t\t\tm_strMaxineVSRStatus = L"Could not create the BGRA8 Maxine input texture";
          \t\t}
          \t\telse if (!pInputTexture->pShaderResource) {
          \t\t\tm_strMaxineVSRStatus = L"The source texture cannot be sampled";
          \t\t}
          \t\telse {
          \t\t\tconst HRESULT copyHr = TextureCopyRect(*pInputTexture, m_TexMaxineInput.pTexture,
          \t\t\t\trSrc, inputRect, m_pPS_Simple, nullptr, 0, false);
          \t\t\tif (FAILED(copyHr)) {
          \t\t\t\tm_strMaxineVSRStatus = L"Could not convert the source to BGRA8";
          \t\t\t}
          \t\t\telse {
          \t\t\t\tif (m_TexMaxineVSR.desc.Width != static_cast<UINT>(maxineTargetSize.cx)
          \t\t\t\t\t\t|| m_TexMaxineVSR.desc.Height != static_cast<UINT>(maxineTargetSize.cy)) {
          \t\t\t\t\tm_MaxineVSR.Reset();
          \t\t\t\t}

          \t\t\t\tconst HRESULT outputCreateHr = m_TexMaxineVSR.CheckCreate(m_pDevice,
          \t\t\t\t\tDXGI_FORMAT_B8G8R8A8_UNORM, maxineTargetSize.cx, maxineTargetSize.cy,
          \t\t\t\t\tTex2D_DefaultShaderRTarget);
          \t\t\t\tif (FAILED(outputCreateHr)) {
          \t\t\t\t\tm_strMaxineVSRStatus = L"Could not create the Maxine output texture";
          \t\t\t\t}
          \t\t\t\telse if (m_MaxineVSR.Process(m_pDeviceContext, m_TexMaxineInput.pTexture,
          \t\t\t\t\t\tm_TexMaxineVSR.pTexture, static_cast<unsigned>(m_iMaxineVSR))) {
          \t\t\t\t\tpInputTexture = &m_TexMaxineVSR;
          \t\t\t\t\trSrc.SetRect(0, 0, maxineTargetSize.cx, maxineTargetSize.cy);
          \t\t\t\t\trotation = 0;
          \t\t\t\t\tm_bMaxineVSRUsed = true;
          \t\t\t\t\tm_strMaxineVSRStatus = m_MaxineVSR.GetStatus();
          \t\t\t\t}
          \t\t\t\telse {
          \t\t\t\t\tm_strMaxineVSRStatus = m_MaxineVSR.GetStatus();
          \t\t\t\t}
          \t\t\t}
          \t\t}
          \t}''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''\tif (config.iVPSuperRes != m_iVPSuperRes) {
          \t\tm_iVPSuperRes = config.iVPSuperRes;
          \t\tchangeSuperRes = true;
          \t}''',
              r'''\tif (config.iVPSuperRes != m_iVPSuperRes) {
          \t\tm_iVPSuperRes = config.iVPSuperRes;
          \t\tchangeSuperRes = true;
          \t\tchangeTextures = true;
          \t}''')

          replace_exact(
              "Source/DX11VideoProcessor.cpp",
              r'''\tif (m_iMaxineVSR != MAXINEVSR_Disable && !m_bMaxineVSRUsed) {
          \t\tstr += std::format(L"\nMaxine VSR   : fallback ({})", m_MaxineVSR.GetStatus());
          \t}''',
              r'''\tif (m_iMaxineVSR != MAXINEVSR_Disable && !m_bMaxineVSRUsed) {
          \t\tstr += std::format(L"\nMaxine VSR   : not used ({})", m_strMaxineVSRStatus);
          \t}''')

          replace_exact(
              "Source/NvidiaMaxineVSR.cpp",
              r'''\twchar_t envPath[32768] = {};
          \tconst DWORD envLen = GetEnvironmentVariableW(L"NV_VIDEO_EFFECTS_PATH", envPath, std::size(envPath));
          \tif (envLen && envLen < std::size(envPath) && _wcsicmp(envPath, L"USE_APP_PATH") != 0) {
          \t\tAdd(envPath);
          \t}''',
              r'''\twchar_t envPath[32768] = {};
          \tconst DWORD envLen = GetEnvironmentVariableW(L"NV_VIDEO_EFFECTS_PATH", envPath, std::size(envPath));
          \tif (envLen && envLen < std::size(envPath) && _wcsicmp(envPath, L"USE_APP_PATH") != 0) {
          \t\tconst std::filesystem::path configuredPath(envPath);
          \t\tAdd(configuredPath.wstring());
          \t\tAdd((configuredPath / L"nvvfx" / L"libs").wstring());
          \t}

          \tfor (const wchar_t* envName : {L"SMOOTHJAS_GPU_RUNTIME", L"JASNA_WORKING_DIR"}) {
          \t\tZeroMemory(envPath, sizeof(envPath));
          \t\tconst DWORD len = GetEnvironmentVariableW(envName, envPath, std::size(envPath));
          \t\tif (len && len < std::size(envPath)) {
          \t\t\tAdd((std::filesystem::path(envPath) / L"nvvfx" / L"libs").wstring());
          \t\t}
          \t}''')

          replace_exact(
              "Source/PropPage.cpp",
              r'''\t\tGetDlgItem(IDC_STATIC7).EnableWindow(bEnable && m_SetsPP.bVPScaling);
          \t\tGetDlgItem(IDC_COMBO8).EnableWindow(bEnable && m_SetsPP.bVPScaling);''',
              r'''\t\tconst BOOL bEnableSuperResLimit = bEnable
          \t\t\t&& (m_SetsPP.bVPScaling || m_SetsPP.iMaxineVSR != MAXINEVSR_Disable);
          \t\tGetDlgItem(IDC_STATIC7).EnableWindow(bEnableSuperResLimit);
          \t\tGetDlgItem(IDC_COMBO8).EnableWindow(bEnableSuperResLimit);''')

          replace_exact(
              "Source/PropPage.cpp",
              r'''\t\t\tif (nID == IDC_CHECK5) {
          \t\t\t\tm_SetsPP.bVPScaling = IsDlgButtonChecked(IDC_CHECK5) == BST_CHECKED;
          \t\t\t\tSetDirty();
          \t\t\t\tGetDlgItem(IDC_STATIC7).EnableWindow(m_SetsPP.bVPScaling && m_SetsPP.bUseD3D11 && IsWindows10OrGreater());
          \t\t\t\tGetDlgItem(IDC_COMBO8).EnableWindow(m_SetsPP.bVPScaling && m_SetsPP.bUseD3D11 && IsWindows10OrGreater());
          \t\t\t\treturn (LRESULT)1;
          \t\t\t}''',
              r'''\t\t\tif (nID == IDC_CHECK5) {
          \t\t\t\tm_SetsPP.bVPScaling = IsDlgButtonChecked(IDC_CHECK5) == BST_CHECKED;
          \t\t\t\tEnableControls();
          \t\t\t\tSetDirty();
          \t\t\t\treturn (LRESULT)1;
          \t\t\t}''')

          replace_exact(
              "Source/PropPage.cpp",
              r'''\tAddHint(IDC_COMBO8,
          \t\tL"Available for Direct3D 11.\n"
          \t\t"Requires hardware and driver support:\n"
          \t\t"- Intel Graphics UHD 610 or later\n"
          \t\t"- Nvidia RTX (x64 only)");
          \tAddHint(IDC_COMBO11,
          \t\tL"Uses NVIDIA Maxine Video Super Resolution through the\n"
          \t\t"NVIDIA Video Effects runtime. Available in the x64 D3D11\n"
          \t\t"renderer for SDR 8-bit video. Unsupported content falls\n"
          \t\t"back to the normal shader scaler.");''',
              r'''\tAddHint(IDC_COMBO8,
          \t\tL"Sets the maximum source resolution for Super Resolution.\n"
          \t\t"When Maxine VSR is enabled, this limit is used by Maxine.\n"
          \t\t"When Maxine VSR is Off, it controls the hardware video\n"
          \t\t"processor Super Resolution request.");
          \tAddHint(IDC_COMBO11,
          \t\tL"Selects NVIDIA Maxine Video Super Resolution quality.\n"
          \t\t"The Super Resolution source limit above is shared with\n"
          \t\t"the normal hardware VSR path. SDR input is converted to\n"
          \t\t"BGRA8 for Maxine; HDR is not supported yet.");''')

          replace_exact(
              "Source/PropPage.cpp",
              r'''\t\t\tif (nID == IDC_COMBO8) {
          \t\t\t\tlValue = SendDlgItemMessageW(IDC_COMBO8, CB_GETCURSEL, 0, 0);
          \t\t\t\tif (lValue != m_SetsPP.iVPSuperRes) {
          \t\t\t\t\tm_SetsPP.iVPSuperRes = lValue;
          \t\t\t\t\tif (lValue != SUPERRES_Disable) {
          \t\t\t\t\t\tm_SetsPP.iMaxineVSR = MAXINEVSR_Disable;
          \t\t\t\t\t\tSendDlgItemMessageW(IDC_COMBO11, CB_SETCURSEL, m_SetsPP.iMaxineVSR, 0);
          \t\t\t\t\t}
          \t\t\t\t\tSetDirty();
          \t\t\t\t}
          \t\t\t\treturn (LRESULT)1;
          \t\t\t}
          \t\t\tif (nID == IDC_COMBO11) {
          \t\t\t\tlValue = SendDlgItemMessageW(IDC_COMBO11, CB_GETCURSEL, 0, 0);
          \t\t\t\tif (lValue != m_SetsPP.iMaxineVSR) {
          \t\t\t\t\tm_SetsPP.iMaxineVSR = lValue;
          \t\t\t\t\tif (lValue != MAXINEVSR_Disable) {
          \t\t\t\t\t\tm_SetsPP.iVPSuperRes = SUPERRES_Disable;
          \t\t\t\t\t\tSendDlgItemMessageW(IDC_COMBO8, CB_SETCURSEL, m_SetsPP.iVPSuperRes, 0);
          \t\t\t\t\t}
          \t\t\t\t\tSetDirty();
          \t\t\t\t}
          \t\t\t\treturn (LRESULT)1;
          \t\t\t}''',
              r'''\t\t\tif (nID == IDC_COMBO8) {
          \t\t\t\tlValue = SendDlgItemMessageW(IDC_COMBO8, CB_GETCURSEL, 0, 0);
          \t\t\t\tif (lValue != m_SetsPP.iVPSuperRes) {
          \t\t\t\t\tm_SetsPP.iVPSuperRes = lValue;
          \t\t\t\t\tSetDirty();
          \t\t\t\t}
          \t\t\t\treturn (LRESULT)1;
          \t\t\t}
          \t\t\tif (nID == IDC_COMBO11) {
          \t\t\t\tlValue = SendDlgItemMessageW(IDC_COMBO11, CB_GETCURSEL, 0, 0);
          \t\t\t\tif (lValue != m_SetsPP.iMaxineVSR) {
          \t\t\t\t\tm_SetsPP.iMaxineVSR = lValue;
          \t\t\t\t\tEnableControls();
          \t\t\t\t\tSetDirty();
          \t\t\t\t}
          \t\t\t\treturn (LRESULT)1;
          \t\t\t}''')
          '@ | Set-Content -LiteralPath apply_changes.py -Encoding utf8
          python apply_changes.py
          Remove-Item apply_changes.py
          Remove-Item .github/workflows/apply-maxine-compat.yml
          git diff --check

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait *>&1 | Tee-Object build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Maxine-compat-build-log
          path: build.log

      - name: Commit compatibility update
        shell: pwsh
        run: |
          Remove-Item build.log -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: broaden Maxine VSR support and share source limit"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR-compat
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
