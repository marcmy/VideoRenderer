name: Build VideoRenderer

on:
  push:
    tags-ignore:
      - 'maxine-*'
    paths-ignore:
      - .github/workflows/main.yml
      - '**.txt'
      - '**.md'
      - '**.cmd'
      - '**.vcxproj.filters'
  pull_request:
    paths-ignore:
      - .github/workflows/main.yml
      - '**.txt'
      - '**.md'
      - '**.cmd'
      - '**.vcxproj.filters'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build VideoRenderer
        run: |
          .\build_mpcvr.cmd NoWait
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: "MPC Video Renderer"
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0

  publish-maxine:
    name: Publish latest Maxine build
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: "MPC Video Renderer"
          path: release

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          package="$(find release -maxdepth 1 -type f -name 'MpcVideoRenderer*.zip' -print -quit)"
          if [[ -z "$package" ]]; then
            echo "No MPC Video Renderer package was found in the build artifact." >&2
            exit 1
          fi

          cp "$package" release/MpcVideoRenderer-Maxine.zip
          (
            cd tools/KLiteMaxineUpdater
            zip -j ../../release/KLiteMaxineUpdater-Setup.zip \
              Install-KLiteMPCVRUpdater.cmd \
              Install-KLiteMPCVRUpdater.ps1 \
              Update-KLiteMPCVR.ps1 \
              README.md
          )

          cd release
          sha256sum MpcVideoRenderer-Maxine.zip > MpcVideoRenderer-Maxine.zip.sha256
          sha256sum KLiteMaxineUpdater-Setup.zip > KLiteMaxineUpdater-Setup.zip.sha256

      - name: Publish immutable release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:8}"
          tag="maxine-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${short_sha}"
          notes="Custom Maxine build from master commit ${GITHUB_SHA}. This release was produced by workflow run ${GITHUB_RUN_NUMBER}, attempt ${GITHUB_RUN_ATTEMPT}."

          gh release create "$tag" \
            release/MpcVideoRenderer-Maxine.zip \
            release/MpcVideoRenderer-Maxine.zip.sha256 \
            release/KLiteMaxineUpdater-Setup.zip \
            release/KLiteMaxineUpdater-Setup.zip.sha256 \
            --target "$GITHUB_SHA" \
            --title "MPC Video Renderer Maxine build ${GITHUB_RUN_NUMBER}" \
            --notes "$notes" \
            --latest
