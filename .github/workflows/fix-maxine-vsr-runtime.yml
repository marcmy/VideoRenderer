name: Fix Maxine VSR runtime loading

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/fix-maxine-vsr-runtime.yml

permissions:
  contents: write

jobs:
  patch-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr
          submodules: recursive

      - name: Patch Maxine runtime loader
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path("Source/NvidiaMaxineVSR.cpp")
          data = path.read_text(encoding="utf-8")

          def replace_between(text: str, start: str, end: str, replacement: str) -> str:
              start_pos = text.index(start)
              end_pos = text.index(end, start_pos)
              return text[:start_pos] + replacement + text[end_pos:]

          search_dirs = r'''std::vector<std::wstring> GetRuntimeSearchDirectories()
          {
          	std::vector<std::wstring> dirs;
          	auto Add = [&dirs](std::wstring dir) {
          		if (dir.empty()) {
          			return;
          		}
          		while (!dir.empty() && (dir.back() == L'\\' || dir.back() == L'/')) {
          			dir.pop_back();
          		}
          		if (dir.empty()) {
          			return;
          		}
          		if (std::find(dirs.begin(), dirs.end(), dir) == dirs.end()) {
          			dirs.emplace_back(std::move(dir));
          		}
          	};

          	auto AddRoot = [&Add](const std::filesystem::path& root) {
          		Add(root.wstring());
          		Add((root / L"nvvfx" / L"libs").wstring());
          		Add((root / L"_internal" / L"nvvfx" / L"libs").wstring());
          	};

          	// Explicit runtime locations must win over old SDK installations beside
          	// the player or in Program Files.
          	wchar_t envPath[32768] = {};
          	for (const wchar_t* envName : {L"NV_VIDEO_EFFECTS_PATH", L"SMOOTHJAS_GPU_RUNTIME", L"JASNA_WORKING_DIR"}) {
          		ZeroMemory(envPath, sizeof(envPath));
          		const DWORD len = GetEnvironmentVariableW(envName, envPath, std::size(envPath));
          		if (len && len < std::size(envPath)
          				&& (_wcsicmp(envName, L"NV_VIDEO_EFFECTS_PATH") != 0 || _wcsicmp(envPath, L"USE_APP_PATH") != 0)) {
          			AddRoot(std::filesystem::path(envPath));
          		}
          	}

          	const std::filesystem::path moduleDir(GetModuleDirectoryFromAddress(&g_moduleAddressMarker));
          	if (!moduleDir.empty()) {
          		AddRoot(moduleDir);
          	}

          	wchar_t pathBuffer[MAX_PATH] = {};
          	if (GetModuleFileNameW(nullptr, pathBuffer, std::size(pathBuffer))) {
          		AddRoot(std::filesystem::path(pathBuffer).parent_path());
          	}

          	// Also honor directories already placed on PATH by a launcher.
          	ZeroMemory(envPath, sizeof(envPath));
          	const DWORD pathLen = GetEnvironmentVariableW(L"PATH", envPath, std::size(envPath));
          	if (pathLen && pathLen < std::size(envPath)) {
          		std::wstring pathValue(envPath, pathLen);
          		size_t offset = 0;
          		while (offset <= pathValue.size()) {
          			const size_t separator = pathValue.find(L';', offset);
          			Add(pathValue.substr(offset, separator == std::wstring::npos ? std::wstring::npos : separator - offset));
          			if (separator == std::wstring::npos) {
          				break;
          			}
          			offset = separator + 1;
          		}
          	}

          	wchar_t programFiles[MAX_PATH] = {};
          	const DWORD pfLen = GetEnvironmentVariableW(L"ProgramFiles", programFiles, std::size(programFiles));
          	if (pfLen && pfLen < std::size(programFiles)) {
          		Add((std::filesystem::path(programFiles) / L"NVIDIA Corporation" / L"NVIDIA Video Effects").wstring());
          	}

          	return dirs;
          }

          '''
          data = replace_between(data,
              "std::vector<std::wstring> GetRuntimeSearchDirectories()",
              "HMODULE LoadRuntimeLibrary",
              search_dirs)

          old_fields = '''\tHMODULE hNvCVImage = nullptr;
          \tHMODULE hNvVideoEffects = nullptr;
          '''
          new_fields = '''\tHMODULE hNvCVImage = nullptr;
          \tHMODULE hNvVideoEffects = nullptr;
          \tstd::vector<HMODULE> hRuntimeDependencies;
          \tstd::wstring runtimeDirectory;
          '''
          if data.count(old_fields) != 1:
              raise RuntimeError("Could not locate runtime module fields")
          data = data.replace(old_fields, new_fields, 1)

          unload_runtime = r'''\tvoid UnloadRuntime()
          \t{
          \t\tResetEffect();

          \t\tfor (auto it = hRuntimeDependencies.rbegin(); it != hRuntimeDependencies.rend(); ++it) {
          \t\t\tif (*it) {
          \t\t\t\tFreeLibrary(*it);
          \t\t\t}
          \t\t}
          \t\thRuntimeDependencies.clear();

          \t\tif (hNvVideoEffects) {
          \t\t\tFreeLibrary(hNvVideoEffects);
          \t\t\thNvVideoEffects = nullptr;
          \t\t}
          \t\tif (hNvCVImage) {
          \t\t\tFreeLibrary(hNvCVImage);
          \t\t\thNvCVImage = nullptr;
          \t\t}
          \t\truntimeDirectory.clear();
          \t}

          '''
          data = replace_between(data, "\tvoid UnloadRuntime()", "\tbool LoadRuntime()", unload_runtime)

          load_runtime = r'''\tbool LoadRuntime()
          \t{
          \t\tif (hNvCVImage && hNvVideoEffects) {
          \t\t\treturn true;
          \t\t}
          \t\tif (runtimeAttempted) {
          \t\t\treturn false;
          \t\t}
          \t\truntimeAttempted = true;

          \t\tstatic constexpr std::array<const wchar_t*, 12> optionalDependencies = {
          \t\t\tL"nppc64_12.dll",
          \t\t\tL"nppial64_12.dll",
          \t\t\tL"nppicc64_12.dll",
          \t\t\tL"nppidei64_12.dll",
          \t\t\tL"nppif64_12.dll",
          \t\t\tL"nppig64_12.dll",
          \t\t\tL"nppim64_12.dll",
          \t\t\tL"nppist64_12.dll",
          \t\t\tL"nppitc64_12.dll",
          \t\t\tL"nvinfer_10.dll",
          \t\t\tL"nvinfer_plugin_10.dll",
          \t\t\tL"nvonnxparser_10.dll",
          \t\t};

          \t\tfor (const auto& directory : GetRuntimeSearchDirectories()) {
          \t\t\tconst std::filesystem::path base(directory);
          \t\t\tconst auto imagePath = base / L"NVCVImage.dll";
          \t\t\tconst auto effectsPath = base / L"NVVideoEffects.dll";
          \t\t\tconst auto ngxRuntimePath = base / L"nvngxruntime.dll";
          \t\t\tconst auto ngxVsrPath = base / L"nvngx_vsr.dll";
          \t\t\tconst auto featurePath = base / L"nvVFXVideoSuperRes.dll";

          \t\t\t// Core-only/older Maxine installations expose NvVFX_CreateEffect but
          \t\t\t// cannot create the modern VideoSuperRes selector. Skip them.
          \t\t\tif (!std::filesystem::is_regular_file(imagePath)
          \t\t\t\t\t|| !std::filesystem::is_regular_file(effectsPath)
          \t\t\t\t\t|| !std::filesystem::is_regular_file(ngxRuntimePath)
          \t\t\t\t\t|| !std::filesystem::is_regular_file(ngxVsrPath)
          \t\t\t\t\t|| !std::filesystem::is_regular_file(featurePath)) {
          \t\t\t\tcontinue;
          \t\t\t}

          \t\t\tstd::vector<HMODULE> dependencies;
          \t\t\tauto LoadDependency = [&](const wchar_t* filename, bool required) {
          \t\t\t\tconst auto dependencyPath = base / filename;
          \t\t\t\tif (!std::filesystem::is_regular_file(dependencyPath)) {
          \t\t\t\t\treturn !required;
          \t\t\t\t}
          \t\t\t\tHMODULE module = LoadRuntimeLibrary(directory, filename);
          \t\t\t\tif (!module) {
          \t\t\t\t\treturn !required;
          \t\t\t\t}
          \t\t\t\tdependencies.push_back(module);
          \t\t\t\treturn true;
          \t\t\t};

          \t\t\tfor (const wchar_t* dependency : optionalDependencies) {
          \t\t\t\tLoadDependency(dependency, false);
          \t\t\t}

          \t\t\tHMODULE imageModule = LoadRuntimeLibrary(directory, L"NVCVImage.dll");
          \t\t\tHMODULE ngxRuntimeModule = LoadRuntimeLibrary(directory, L"nvngxruntime.dll");
          \t\t\tHMODULE effectsModule = LoadRuntimeLibrary(directory, L"NVVideoEffects.dll");
          \t\t\tHMODULE ngxVsrModule = LoadRuntimeLibrary(directory, L"nvngx_vsr.dll");
          \t\t\tHMODULE featureModule = LoadRuntimeLibrary(directory, L"nvVFXVideoSuperRes.dll");

          \t\t\tif (imageModule && ngxRuntimeModule && effectsModule && ngxVsrModule && featureModule) {
          \t\t\t\thNvCVImage = imageModule;
          \t\t\t\thNvVideoEffects = effectsModule;
          \t\t\t\tdependencies.push_back(ngxRuntimeModule);
          \t\t\t\tdependencies.push_back(ngxVsrModule);
          \t\t\t\tdependencies.push_back(featureModule);
          \t\t\t\thRuntimeDependencies = std::move(dependencies);
          \t\t\t\truntimeDirectory = directory;
          \t\t\t\tbreak;
          \t\t\t}

          \t\t\tif (featureModule) FreeLibrary(featureModule);
          \t\t\tif (ngxVsrModule) FreeLibrary(ngxVsrModule);
          \t\t\tif (effectsModule) FreeLibrary(effectsModule);
          \t\t\tif (ngxRuntimeModule) FreeLibrary(ngxRuntimeModule);
          \t\t\tif (imageModule) FreeLibrary(imageModule);
          \t\t\tfor (auto it = dependencies.rbegin(); it != dependencies.rend(); ++it) {
          \t\t\t\tFreeLibrary(*it);
          \t\t\t}
          \t\t}

          \t\tif (!hNvCVImage || !hNvVideoEffects) {
          \t\t\tstatus = L"Compatible VideoSuperRes runtime not found; set NV_VIDEO_EFFECTS_PATH to the nvvfx\\libs directory";
          \t\t\treturn false;
          \t\t}

          \t\tconst bool ok =
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_GetVersion", NvVFX_GetVersion) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_CreateEffect", NvVFX_CreateEffect) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_DestroyEffect", NvVFX_DestroyEffect) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_SetU32", NvVFX_SetU32) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_SetImage", NvVFX_SetImage) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_SetCudaStream", NvVFX_SetCudaStream) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_Load", NvVFX_Load) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_Run", NvVFX_Run) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_CudaStreamCreate", NvVFX_CudaStreamCreate) &&
          \t\t\tLoadProc(hNvVideoEffects, "NvVFX_CudaStreamDestroy", NvVFX_CudaStreamDestroy) &&
          \t\t\tLoadProc(hNvCVImage, "NvCVImage_Alloc", NvCVImage_Alloc) &&
          \t\t\tLoadProc(hNvCVImage, "NvCVImage_Dealloc", NvCVImage_Dealloc) &&
          \t\t\tLoadProc(hNvCVImage, "NvCVImage_Transfer", NvCVImage_Transfer) &&
          \t\t\tLoadProc(hNvCVImage, "NvCVImage_InitFromD3D11Texture", NvCVImage_InitFromD3D11Texture) &&
          \t\t\tLoadProc(hNvCVImage, "NvCVImage_MapResource", NvCVImage_MapResource) &&
          \t\t\tLoadProc(hNvCVImage, "NvCVImage_UnmapResource", NvCVImage_UnmapResource);

          \t\tLoadProc(hNvCVImage, "NvCV_GetErrorStringFromCode", NvCV_GetErrorStringFromCode);

          \t\tif (!ok) {
          \t\t\tstatus = std::format(L"VideoSuperRes runtime at {} is missing required exports", runtimeDirectory);
          \t\t\tUnloadRuntime();
          \t\t\treturn false;
          \t\t}

          \t\tconst NvCV_Status versionStatus = NvVFX_GetVersion(&sdkVersion);
          \t\tif (versionStatus != NVCV_SUCCESS) {
          \t\t\tSetError(L"NvVFX_GetVersion", versionStatus);
          \t\t\tUnloadRuntime();
          \t\t\treturn false;
          \t\t}

          \t\tstatus = std::format(L"Runtime {}.{}.{} loaded from {}",
          \t\t\t(sdkVersion >> 24) & 0xff,
          \t\t\t(sdkVersion >> 16) & 0xff,
          \t\t\t(sdkVersion >> 8) & 0xff,
          \t\t\truntimeDirectory);
          \t\tDLog(L"NVIDIA Maxine VSR: {}", status);
          \t\treturn true;
          \t}

          '''
          data = replace_between(data, "\tbool LoadRuntime()", "\tbool EnsureEffect(", load_runtime)

          old_create = '''\t\tcode = NvVFX_CreateEffect("VideoSuperRes", &effect);
          \t\tif (code != NVCV_SUCCESS) {
          \t\t\tSetError(L"NvVFX_CreateEffect(VideoSuperRes)", code);
          \t\t\tResetEffect();
          \t\t\tfailed = true;
          \t\t\treturn false;
          \t\t}
          '''
          new_create = '''\t\tcode = NvVFX_CreateEffect("VideoSuperRes", &effect);
          \t\tif (code != NVCV_SUCCESS) {
          \t\t\tif (code == -2) {
          \t\t\t\tstatus = std::format(L"VideoSuperRes feature did not register in runtime {}.{}.{} at {}",
          \t\t\t\t\t(sdkVersion >> 24) & 0xff,
          \t\t\t\t\t(sdkVersion >> 16) & 0xff,
          \t\t\t\t\t(sdkVersion >> 8) & 0xff,
          \t\t\t\t\truntimeDirectory);
          \t\t\t\tDLog(L"NVIDIA Maxine VSR: {}", status);
          \t\t\t}
          \t\t\telse {
          \t\t\t\tSetError(L"NvVFX_CreateEffect(VideoSuperRes)", code);
          \t\t\t}
          \t\t\tResetEffect();
          \t\t\tfailed = true;
          \t\t\treturn false;
          \t\t}
          '''
          if data.count(old_create) != 1:
              raise RuntimeError("Could not locate VideoSuperRes CreateEffect block")
          data = data.replace(old_create, new_create, 1)

          path.write_text(data, encoding="utf-8", newline="")
          '@ | Set-Content -LiteralPath patch_runtime.py -Encoding utf8
          python patch_runtime.py
          Remove-Item patch_runtime.py
          Remove-Item .github/workflows/fix-maxine-vsr-runtime.yml
          git diff --check

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait *>&1 | Tee-Object build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Maxine-runtime-loader-build-log
          path: build.log

      - name: Commit runtime loader fix
        shell: pwsh
        run: |
          Remove-Item build.log -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: load complete Maxine VideoSuperRes runtime"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR-runtime-fix
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
