name: Reapply broader Maxine VSR support

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/reapply-maxine-compat.yml

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: windows-2022
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/nvidia-maxine-vsr
          submodules: recursive

      - name: Recover and run corrected compatibility script
        shell: pwsh
        run: |
          $prior = git show ceb9259257de532bce3b4f51ab9565774872478a:.github/workflows/apply-maxine-compat.yml
          $start = [Array]::IndexOf($prior, "          @'") + 1
          $end = [Array]::IndexOf($prior, "          '@ | Set-Content -LiteralPath apply_changes.py -Encoding utf8")
          if ($start -le 0 -or $end -le $start) { throw 'Could not recover compatibility script.' }

          $scriptLines = $prior[$start..($end - 1)] | ForEach-Object {
            if ($_.Length -ge 10) { $_.Substring(10) } else { $_ }
          }
          $script = $scriptLines -join "`n"
          $script = $script.Replace(
            'old_bytes = old.replace("\n", newline.decode()).encode("utf-8")',
            'old_bytes = old.replace("\\t", "\t").replace("\n", newline.decode()).encode("utf-8")')
          $script = $script.Replace(
            'new_bytes = new.replace("\n", newline.decode()).encode("utf-8")',
            'new_bytes = new.replace("\\t", "\t").replace("\n", newline.decode()).encode("utf-8")')
          [IO.File]::WriteAllText('apply_changes.py', $script, [Text.UTF8Encoding]::new($false))

          python apply_changes.py
          Remove-Item apply_changes.py
          Remove-Item .github/workflows/reapply-maxine-compat.yml
          git diff --check

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait *>&1 | Tee-Object build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Maxine-compat-v2-build-log
          path: build.log

      - name: Commit compatibility update
        shell: pwsh
        run: |
          Remove-Item build.log -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: broaden Maxine VSR support and share source limit"
          git push origin HEAD:feature/nvidia-maxine-vsr

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: MPC-Video-Renderer-Maxine-VSR-compat-v2
          path: _bin/MpcVideoRenderer*.zip
          compression-level: 0
